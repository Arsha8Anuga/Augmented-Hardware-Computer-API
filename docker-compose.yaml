services:
  app:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ./.env
    ports:
      - 40003:8080
    depends_on:
      - mongo-db

  mongo-db:
    image: mongo:6.0
    restart: always
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    env_file:
      - ./.env
    volumes:
      - mongodb_data:/data/db:rw

volumes:
  mongodb_data:
